<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ZapSign Automação</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      border: none;
      border-radius: 1rem;
      box-shadow: 0 1rem 3rem rgba(0,0,0,.4);
    }
    .login-header {
      background: linear-gradient(135deg, #0d6efd, #0a58ca);
      border-radius: 1rem 1rem 0 0;
      padding: 2rem;
      text-align: center;
      color: white;
    }
    .login-header i { font-size: 2.5rem; }
    .login-body { padding: 2rem; }
    .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 .2rem rgba(13,110,253,.25); }
    .btn-login { background: linear-gradient(135deg, #0d6efd, #0a58ca); border: none; padding: .75rem; font-size: 1rem; border-radius: .5rem; }
    .btn-login:hover { background: linear-gradient(135deg, #0a58ca, #084298); }
  </style>
</head>
<body>
<div class="login-card card mx-3">
  <div class="login-header">
    <i class="bi bi-file-earmark-check-fill"></i>
    <h4 class="mt-2 mb-0 fw-bold">ZapSign Automação</h4>
    <p class="mb-0 opacity-75 small">Acesse sua conta</p>
  </div>
  <div class="login-body">
    {% if form.errors %}
      <div class="alert alert-danger py-2">
        <i class="bi bi-exclamation-circle"></i> Usuário ou senha inválidos.
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold" for="id_username">
          <i class="bi bi-person"></i> Usuário
        </label>
        <input
          type="text"
          class="form-control form-control-lg"
          id="id_username"
          name="username"
          autofocus
          autocomplete="username"
          placeholder="Digite seu usuário"
        />
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" for="id_password">
          <i class="bi bi-lock"></i> Senha
        </label>
        <input
          type="password"
          class="form-control form-control-lg"
          id="id_password"
          name="password"
          autocomplete="current-password"
          placeholder="Digite sua senha"
        />
      </div>
      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit" class="btn btn-primary btn-login w-100 text-white fw-semibold">
        <i class="bi bi-box-arrow-in-right"></i> Entrar
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmWaODN9N4Sfd7+bE9d7XWVT8dh8" crossorigin="anonymous"></script>
</body>
</html>
