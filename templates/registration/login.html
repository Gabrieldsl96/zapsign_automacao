{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ZapSign Automação</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Quicksand", sans-serif; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #eaeef6;
      overflow: hidden;
    }

    .ring {
      position: relative;
      width: 500px;
      height: 500px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .ring i {
      position: absolute;
      inset: 0;
      border: 2px solid #b0bcd4;
      transition: 0.5s;
    }
    .ring i:nth-child(1) {
      border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
      animation: animate 6s linear infinite;
    }
    .ring i:nth-child(2) {
      border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
      animation: animate 4s linear infinite;
    }
    .ring i:nth-child(3) {
      border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
      animation: animate2 10s linear infinite;
    }
    .ring:hover i {
      border: 6px solid var(--clr);
      filter: drop-shadow(0 0 20px var(--clr));
    }
    @keyframes animate {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes animate2 {
      0%   { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    .login {
      position: absolute;
      width: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
    }
    .login h2 {
      font-size: 2em;
      color: #2d3a55;
      letter-spacing: .05em;
    }
    .login .inputBx {
      position: relative;
      width: 100%;
    }
    .login .inputBx input {
      width: 100%;
      padding: 12px 20px;
      background: #fff;
      border: 2px solid #c8d0e0;
      border-radius: 40px;
      font-size: 1.2em;
      color: #2d3a55;
      outline: none;
      transition: border-color .3s, box-shadow .3s;
    }
    .login .inputBx input:focus {
      border-color: #406ff3;
      box-shadow: 0 0 0 3px rgba(64,111,243,.12);
    }
    .login .inputBx input::placeholder { color: #8fa0b8; }
    .login .inputBx input[type="submit"] {
      background: linear-gradient(45deg, #ff357a, #fff172);
      border: none;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: .04em;
    }
    .login .inputBx input[type="submit"]:hover {
      opacity: .88;
    }

    .error-msg {
      width: 100%;
      background: rgba(255, 53, 122, .08);
      border: 1px solid rgba(255, 53, 122, .4);
      border-radius: 40px;
      padding: 10px 20px;
      color: #c0284a;
      font-size: .95em;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="ring">
  <i style="--clr:#00ff0a;"></i>
  <i style="--clr:#ff0057;"></i>
  <i style="--clr:#fffd44;"></i>

  <div class="login">
    <h2>ZapSign - RN</h2>

    {% if form.errors %}
      <div class="error-msg">Usuário ou senha inválidos.</div>
    {% endif %}

    <form method="post" style="width:100%;display:flex;flex-direction:column;gap:20px;">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}" />

      <div class="inputBx">
        <input type="text" name="username" placeholder="Usuário" autofocus autocomplete="username" />
      </div>
      <div class="inputBx">
        <input type="password" name="password" placeholder="Senha" autocomplete="current-password" />
      </div>
      <div class="inputBx">
        <input type="submit" value="Entrar" />
      </div>
    </form>
  </div>
</div>

</body>
</html>
