<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ZapSign — Automação de Documentos{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .badge-not_created  { background-color: #6c757d; }
    .badge-doc1_pending { background-color: #0d6efd; }
    .badge-doc2_pending { background-color: #fd7e14; }
    .badge-pending      { background-color: #0d6efd; }
    .badge-signed       { background-color: #198754; }
    .badge-completed    { background-color: #198754; }
    .doc-card { border-left: 4px solid #0d6efd; }
    .doc-card.signed { border-left-color: #198754; }
    .doc-card.not_created { border-left-color: #adb5bd; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'documents:index' %}">
      <i class="bi bi-file-earmark-check"></i> ZapSign Automação
    </a>
    <div class="ms-auto">
      <a href="{% url 'documents:create_flow' %}" class="btn btn-success btn-sm">
        <i class="bi bi-plus-lg"></i> Novo Fluxo
      </a>
    </div>
  </div>
</nav>

<div class="container pb-5">

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmWaODN9N4Sfd7+bE9d7XWVT8dh8"
  crossorigin="anonymous"
></script>
{% block extra_js %}{% endblock %}
</body>
</html>
