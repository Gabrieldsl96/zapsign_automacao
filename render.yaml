services:
  - type: web
    name: zapgsing-api
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn zapgsing_api.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://zapgsing-api.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: zapgsing-api-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ZAPSIGN_API_TOKEN
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@admin.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true

databases:
  - name: zapgsing-api-db
    databaseName: zapgsing_api
    user: zapgsing_api
    plan: free
